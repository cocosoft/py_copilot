<!DOCTYPE html>
<html>
<head>
    <title>清除搜索关键词</title>
</head>
<body>
    <h1>清除知识库搜索关键词</h1>
    <p>点击下面的按钮清除本地存储中的搜索关键词</p>
    <button onclick="clearSearch()">清除搜索关键词</button>
    <div id="result"></div>

    <script>
        function clearSearch() {
            // 清除 knowledge-store 中的搜索关键词
            const storageKey = 'knowledge-store';
            const stored = localStorage.getItem(storageKey);

            if (stored) {
                try {
                    const data = JSON.parse(stored);
                    if (data.state && data.state.documentFilters) {
                        data.state.documentFilters.search = '';
                        localStorage.setItem(storageKey, JSON.stringify(data));
                        document.getElementById('result').innerHTML = '<p style="color: green;">✓ 搜索关键词已清除！请刷新知识库页面。</p>';
                    } else {
                        document.getElementById('result').innerHTML = '<p style="color: orange;">未找到搜索关键词</p>';
                    }
                } catch (e) {
                    document.getElementById('result').innerHTML = '<p style="color: red;">错误: ' + e.message + '</p>';
                }
            } else {
                document.getElementById('result').innerHTML = '<p style="color: orange;">未找到 knowledge-store</p>';
            }
        }
    </script>
</body>
</html>
